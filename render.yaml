services:
  - type: web
    name: recomai-backend
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: TMDB_API_KEY
        sync: false          # set this manually in the Render dashboard
      - key: PYTHONUNBUFFERED
        value: "1"
